<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Запись на тренировку</title>
  <link rel="manifest" href="./manifest.json">
  <!-- Подключаем библиотеку Google Identity Services (GSI) -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      margin: 0; padding: 0; height: 100vh; background-color: #F3F4F6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #loading {
      display: flex; flex-direction: column; justify-content: center; align-items: center; 
      height: 100vh; text-align: center;
    }
    h2 { color: #2980b9; margin-bottom: 20px; }
  </style>
</head>
<body>

<!-- Экран авторизации (показывается до входа) -->
<div id="loading">
  <h2>Вход в систему</h2>
  <p style="color: #7f8c8d; margin-bottom: 30px;">Для записи на тренировку необходимо авторизоваться</p>
  
  <!-- Конфигурация Google Sign-In -->
  <div id="g_id_onload" 
       data-client_id="424383142259-hhgoga4jo7fg1p5eh5a0hmaon81geh8m.apps.googleusercontent.com" 
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  <!-- Кнопка входа -->
  <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="sign_in_with" data-shape="rectangular" data-logo_alignment="left"></div>
</div>

<!-- Iframe для загрузки Apps Script (скрыт до успешной авторизации) -->
<iframe id="iframe" width="100%" height="100%" style="height:100vh; display: none; border:none;" src=""></iframe>

<script>
  // ВАЖНО: Замените на актуальный URL вашего Apps Script
  const pwaUrl = "https://script.google.com/macros/s/AKfycbwjLIzy3D3NuoG2twGsehaw65sfImKECkfsvvxRQaP-kfNZSSbFIULT5SwX8TMOYpkAMA/exec";

  // Функция вызывается автоматически после успешного входа через Google
  function handleCredentialResponse(response) {
    if (response.credential) {
      // Получаем JWT токен
      const token = response.credential;
      
      console.log('Успешная авторизация, загрузка приложения...');
      
      // Скрываем окно логина
      document.getElementById('loading').style.display = 'none';
      
      // Показываем iframe и передаем токен как GET-параметр
      const iframe = document.getElementById('iframe');
      iframe.style.display = 'block';
      iframe.src = pwaUrl + "?token=" + encodeURIComponent(token);
    } else {
      console.error('Ошибка: токен не получен');
    }
  }
</script>
</body>
</html>
